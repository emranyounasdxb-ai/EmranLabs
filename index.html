<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Emran Labs Deployment Test</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #0f2b5b 0%, #06111f 50%, #02060d 100%);
      color: #fff;
    }
    main {
      width: min(92%, 760px);
      padding: 48px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 24px;
      background: rgba(255,255,255,.07);
      box-shadow: 0 24px 80px rgba(0,0,0,.45);
      text-align: center;
      backdrop-filter: blur(16px);
    }
    h1 { margin: 0 0 14px; font-size: clamp(34px, 7vw, 64px); }
    p { margin: 8px 0; color: #c9daf5; font-size: 18px; line-height: 1.6; }
    .status {
      display: inline-block;
      margin-top: 24px;
      padding: 10px 18px;
      border-radius: 999px;
      background: #19c37d;
      color: #02130d;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Emran Labs</h1>
    <p>GitHub to cPanel deployment test page.</p>
    <p>Domain, Cloudflare, SSL and repository deployment are working.</p>
    <div class="status">Deployment Test Successful</div>
  </main>
</body>
</html>
