name: Remove Three.js dependencies

on:
  push:
    branches:
      - chore/remove-globe-threejs

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: chore/remove-globe-threejs
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.11.0 --activate

      - name: Install current dependencies
        run: pnpm install --frozen-lockfile

      - name: Remove Three.js packages
        run: |
          pnpm remove @react-three/fiber three
          pnpm remove --save-dev @types/three

      - name: Validate static desktop
        run: |
          pnpm lint
          pnpm typecheck
          pnpm format:check
          pnpm build
          pnpm exec next build --webpack
          git diff --check

      - name: Remove temporary workflow and commit
        run: |
          git rm .github/workflows/remove-three-dependencies.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json pnpm-lock.yaml
          git commit -m "Remove unused Three.js dependencies"
          git push origin HEAD:chore/remove-globe-threejs
