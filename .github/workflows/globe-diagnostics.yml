name: Globe diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.11.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Capture lint output
        run: |
          set +e
          pnpm lint > lint-output.txt 2>&1
          status=$?
          cat lint-output.txt
          echo "$status" > lint-status.txt
          exit 0

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: globe-lint-diagnostics
          path: |
            lint-output.txt
            lint-status.txt
          retention-days: 1
