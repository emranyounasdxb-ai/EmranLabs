name: Import Earth textures

on:
  push:
    branches:
      - fix/photorealistic-earth-satellites

permissions:
  contents: write

jobs:
  import-textures:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix/photorealistic-earth-satellites
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.11.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download official Three.js Earth textures
        run: |
          set -euo pipefail
          mkdir -p public/textures/earth
          base="https://raw.githubusercontent.com/mrdoob/three.js/r181/examples/textures/planets"
          curl --fail --location --silent --show-error "$base/earth_atmos_2048.jpg" --output public/textures/earth/earth-atmosphere.jpg
          curl --fail --location --silent --show-error "$base/earth_normal_2048.jpg" --output public/textures/earth/earth-normal.jpg
          curl --fail --location --silent --show-error "$base/earth_lights_2048.png" --output public/textures/earth/earth-lights.png
          curl --fail --location --silent --show-error "$base/earth_clouds_1024.png" --output public/textures/earth/earth-clouds.png

          cat > public/textures/earth/ATTRIBUTION.md <<'EOF'
          # Earth texture attribution

          These Earth texture assets are copied from the official Three.js repository at tag `r181`:

          - `earth_atmos_2048.jpg`
          - `earth_normal_2048.jpg`
          - `earth_lights_2048.png`
          - `earth_clouds_1024.png`

          Source: https://github.com/mrdoob/three.js/tree/r181/examples/textures/planets

          Three.js is distributed under the MIT License.
          EOF

      - name: Format globe files
        run: |
          pnpm exec prettier --write \
            src/components/three/emran-digital-core.tsx \
            src/components/desktop/desktop-background.tsx

      - name: Commit textures and formatting
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/textures/earth src/components/three/emran-digital-core.tsx src/components/desktop/desktop-background.tsx
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Add photorealistic Earth texture assets"
          git push origin HEAD:fix/photorealistic-earth-satellites
