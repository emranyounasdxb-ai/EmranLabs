name: Validate foundation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.23.0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.11.0
          run_install: false

      - name: Install dependencies and synchronize lockfile
        run: pnpm install --no-frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run type checking
        run: pnpm typecheck

      - name: Check formatting
        run: pnpm format:check

      - name: Build application
        run: pnpm build

      - name: Commit synchronized lockfile
        run: |
          git config user.name "emranyounasdxb-ai"
          git config user.email "292407963+emranyounasdxb-ai@users.noreply.github.com"
          git add pnpm-lock.yaml
          git rm .github/workflows/validate-foundation.yml
          git commit -m "Synchronize the dependency lockfile"
          git push origin HEAD:${{ github.head_ref }}
