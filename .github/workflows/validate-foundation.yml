name: Validate foundation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.23.0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.11.0
          run_install: false

      - name: Install dependencies and synchronize lockfile
        run: pnpm install --no-frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run type checking
        run: pnpm typecheck

      - name: Check formatting
        run: pnpm format:check

      - name: Build application
        run: pnpm build

      - name: Upload synchronized lockfile
        uses: actions/upload-artifact@v4
        with:
          name: synchronized-lockfile
          path: pnpm-lock.yaml
          if-no-files-found: error
