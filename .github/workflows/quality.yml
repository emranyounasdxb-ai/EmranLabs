name: Quality checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, format, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.11.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Check desktop window formatting
        run: pnpm exec prettier --check src/components/desktop/desktop-window.tsx

      - name: Check desktop store formatting
        if: always()
        run: pnpm exec prettier --check src/stores/desktop-store.ts

      - name: Check README formatting
        if: always()
        run: pnpm exec prettier --check README.md

      - name: Check workflow formatting
        if: always()
        run: pnpm exec prettier --check .github/workflows/quality.yml

      - name: Check project formatting
        if: always()
        run: pnpm format:check

      - name: Build application
        if: always()
        run: pnpm build
