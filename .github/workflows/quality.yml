name: Quality checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, format, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.11.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply project formatting
        if: github.event_name == 'pull_request'
        run: pnpm exec prettier --write src/components/desktop/desktop-window.tsx

      - name: Commit formatting correction
        if: github.event_name == 'pull_request'
        run: |
          if git diff --quiet -- src/components/desktop/desktop-window.tsx; then
            exit 0
          fi
          git config user.name "emranyounasdxb-ai"
          git config user.email "292407963+emranyounasdxb-ai@users.noreply.github.com"
          git add src/components/desktop/desktop-window.tsx
          git commit -m "Format desktop window component"
          git push origin HEAD:${{ github.head_ref }}

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Check formatting
        run: pnpm format:check

      - name: Build application
        run: pnpm build
