name: Validate cinematic world

on:
  push:
    branches:
      - feature/fullscreen-cinematic-3d-world

permissions:
  contents: write

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/fullscreen-cinematic-3d-world
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.11.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Correct Three.js texture types
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/components/three/emran-digital-core.tsx')
          text = path.read_text()
          text = text.replace(
              'import type { Group, Mesh, Points } from "three";',
              'import type { Group, Mesh, Points, Texture } from "three";',
          )
          text = text.replace(
              '  Vector2,\n} from "three";',
              '  Vector2,\n  Vector3,\n} from "three";',
          )
          text = text.replace(
              '  dayTexture: ReturnType<typeof useLoader<TextureLoader>>[number];\n  nightTexture: ReturnType<typeof useLoader<TextureLoader>>[number];',
              '  dayTexture: Texture;\n  nightTexture: Texture;',
          )
          text = text.replace(
              '      sunDirection: { value: [0.8, 0.34, 0.52] },',
              '      sunDirection: { value: new Vector3(0.8, 0.34, 0.52) },',
          )
          path.write_text(text)
          PY

      - name: Format files
        run: |
          pnpm exec prettier --write \
            src/components/three/emran-digital-core.tsx \
            src/components/desktop/desktop-background.tsx

      - name: Commit corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/three/emran-digital-core.tsx src/components/desktop/desktop-background.tsx
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Fix cinematic Three.js types and formatting"
          git push origin HEAD:feature/fullscreen-cinematic-3d-world

      - name: Validate
        run: |
          pnpm lint
          pnpm typecheck
          pnpm format:check
          pnpm build
          pnpm exec next build --webpack
          git diff --check
