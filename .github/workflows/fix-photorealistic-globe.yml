name: Fix photorealistic globe

on:
  push:
    branches:
      - fix/photorealistic-earth-satellites

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/photorealistic-earth-satellites
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.11.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Make texture configuration immutable
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/components/three/emran-digital-core.tsx")
          text = path.read_text()
          old = '''  const [surfaceTexture, normalTexture, lightsTexture, cloudsTexture] =
    useLoader(TextureLoader, EARTH_TEXTURES);

  const normalScale = useMemo(() => new Vector2(0.56, 0.56), []);

  useEffect(() => {
    const anisotropy = Math.min(8, gl.capabilities.getMaxAnisotropy());

    surfaceTexture.colorSpace = SRGBColorSpace;
    lightsTexture.colorSpace = SRGBColorSpace;
    cloudsTexture.colorSpace = SRGBColorSpace;

    for (const texture of [
      surfaceTexture,
      normalTexture,
      lightsTexture,
      cloudsTexture,
    ]) {
      texture.wrapS = RepeatWrapping;
      texture.anisotropy = anisotropy;
      texture.needsUpdate = true;
    }
  }, [cloudsTexture, gl, lightsTexture, normalTexture, surfaceTexture]);
'''
          new = '''  const sourceTextures = useLoader(TextureLoader, EARTH_TEXTURES);
  const [surfaceTexture, normalTexture, lightsTexture, cloudsTexture] =
    useMemo(() => {
      const anisotropy = Math.min(8, gl.capabilities.getMaxAnisotropy());

      return sourceTextures.map((sourceTexture, index) => {
        const texture = sourceTexture.clone();
        if (index !== 1) texture.colorSpace = SRGBColorSpace;
        texture.wrapS = RepeatWrapping;
        texture.anisotropy = anisotropy;
        texture.needsUpdate = true;
        return texture;
      });
    }, [gl, sourceTextures]);

  const normalScale = useMemo(() => new Vector2(0.56, 0.56), []);

  useEffect(
    () => () => {
      surfaceTexture.dispose();
      normalTexture.dispose();
      lightsTexture.dispose();
      cloudsTexture.dispose();
    },
    [cloudsTexture, lightsTexture, normalTexture, surfaceTexture],
  );
'''
          if old not in text:
              raise SystemExit("Expected texture configuration block was not found")
          path.write_text(text.replace(old, new))
          PY

          pnpm exec prettier --write src/components/three/emran-digital-core.tsx

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/three/emran-digital-core.tsx
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Fix immutable Earth texture configuration"
          git push origin HEAD:fix/photorealistic-earth-satellites
