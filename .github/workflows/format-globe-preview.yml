name: Format globe preview

on:
  push:
    branches:
      - feature/3d-globe-satellites

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.11.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format changed globe files
        run: pnpm exec prettier --write src/components/three/emran-digital-core.tsx src/components/desktop/desktop-background.tsx src/data/world-map-path.ts

      - name: Upload formatted files
        uses: actions/upload-artifact@v4
        with:
          name: formatted-globe-files
          path: |
            src/components/three/emran-digital-core.tsx
            src/components/desktop/desktop-background.tsx
            src/data/world-map-path.ts
          if-no-files-found: error
          retention-days: 1
